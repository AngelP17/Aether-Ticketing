services:
  - type: web
    name: aether-opscenter
    env: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: ENV
        value: production
      - key: DEBUG
        value: false
      - key: USERS_FILE
        value: /app/users.json
