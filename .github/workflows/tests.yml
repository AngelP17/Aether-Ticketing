name: Regression Tests

on:
  push:
    paths:
      - "tests/**"
      - "pipelines/**"
      - "apps/api/**"
  pull_request:
    paths:
      - "tests/**"
      - "pipelines/**"
      - "apps/api/**"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest tests/decision tests/reports -v --tb=short
