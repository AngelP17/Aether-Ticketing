name: CI Web

on:
  push:
    paths:
      - 'apps/web/**'
  pull_request:
    paths:
      - 'apps/web/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: apps/web
        run: npm install
      - working-directory: apps/web
        run: npm run typecheck
      - working-directory: apps/web
        run: npm run lint
      - working-directory: apps/web
        run: npm run build
