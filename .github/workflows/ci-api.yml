name: CI API

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
      - run: python -m compileall apps/api infrastructure pipelines domain scripts tests
      - run: ruff check apps/ infrastructure/ pipelines/ domain/ scripts/ tests/
      - run: python -m mypy --namespace-packages --explicit-package-bases apps/ infrastructure/ pipelines/ domain/ tests/ scripts/ --ignore-missing-imports
      - run: pytest tests/ -v --tb=short --cov=apps --cov=infrastructure --cov=pipelines --cov=domain --cov-report=term-missing --cov-fail-under=35
