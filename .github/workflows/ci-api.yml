name: CI API

on:
  push:
    paths:
      - 'apps/api/**'
      - 'infrastructure/**'
      - 'pipelines/**'
      - 'domain/**'
      - 'scripts/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci-api.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'infrastructure/**'
      - 'pipelines/**'
      - 'domain/**'
      - 'scripts/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci-api.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
      - run: python -m compileall apps/api infrastructure pipelines domain scripts tests
      - run: pytest tests/ -v --tb=short
      - run: ruff check apps/ infrastructure/ pipelines/ domain/ scripts/ tests/
