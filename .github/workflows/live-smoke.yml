name: Live Smoke

on:
  deployment_status:
  schedule:
    - cron: "17 15 * * *"
  workflow_dispatch:

jobs:
  render-smoke:
    if: ${{ github.event_name != 'deployment_status' || github.event.deployment_status.state == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check required secret
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          if [ -z "$RENDER_APP_URL" ]; then
            echo "RENDER_APP_URL is not configured; skipping live smoke."
            exit 0
          fi
      - name: Run live demo smoke checks
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          ADMIN_LIVE_PASSWORD: ${{ secrets.ADMIN_LIVE_PASSWORD }}
        run: |
          echo "::add-mask::$RENDER_APP_URL"
          if [ -n "$ADMIN_LIVE_PASSWORD" ]; then
            echo "::add-mask::$ADMIN_LIVE_PASSWORD"
          fi
          python - <<'PY'
          import textwrap

          code = r'''
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          base_url = os.environ.get("RENDER_APP_URL", "").rstrip("/")
          if not base_url:
              print("RENDER_APP_URL is not configured; skipping live smoke.")
              sys.exit(0)

          api_base = urllib.parse.urljoin(base_url + "/", "api/")
          expected_titles = {
              "VPN access fails after password reset",
              "Shared mailbox forwarding rule missing",
              "Printer queue stuck on third floor",
              "ERP approval page timing out",
              "Laptop disk encryption recovery prompt",
              "New hire account missing groups",
              "Phishing report needs review",
              "Warehouse scanner cannot sync inventory",
          }

          def request_json(path, *, token=None, body=None, method="GET"):
              headers = {"Accept": "application/json"}
              data = None
              if body is not None:
                  data = json.dumps(body).encode()
                  headers["Content-Type"] = "application/json"
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              req = urllib.request.Request(
                  urllib.parse.urljoin(api_base, path),
                  data=data,
                  headers=headers,
                  method=method,
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      return resp.status, json.loads(resp.read().decode() or "{}")
              except urllib.error.HTTPError as exc:
                  raw = exc.read().decode(errors="replace")
                  try:
                      payload = json.loads(raw or "{}")
                  except json.JSONDecodeError:
                      payload = {"raw": raw[:120]}
                  return exc.code, payload

          viewer_status, viewer_payload = request_json(
              "auth/login",
              method="POST",
              body={"username": "viewer", "password": "viewer123"},
          )
          assert viewer_status == 200, f"viewer login failed: {viewer_status}"

          weak_admin_status, _ = request_json(
              "auth/login",
              method="POST",
              body={"username": "admin", "password": "admin123"},
          )
          assert weak_admin_status == 401, f"admin/admin123 should fail, got {weak_admin_status}"

          admin_password = os.environ.get("ADMIN_LIVE_PASSWORD")
          if admin_password:
              admin_status, _ = request_json(
                  "auth/login",
                  method="POST",
                  body={"username": "admin", "password": admin_password},
              )
              assert admin_status == 200, f"private admin login failed: {admin_status}"

          token = viewer_payload["access_token"]
          tickets_status, tickets_payload = request_json("tickets?limit=50", token=token)
          assert tickets_status == 200, f"ticket list failed: {tickets_status}"
          rows = tickets_payload if isinstance(tickets_payload, list) else tickets_payload.get("tickets", [])
          titles = {row.get("title") for row in rows}
          assert titles == expected_titles, f"unexpected live demo titles: {sorted(titles)}"
          '''

          exec(textwrap.dedent(code))
          PY
