services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aether}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aether}
      POSTGRES_DB: ${POSTGRES_DB:-aether}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - aether_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aether} -d ${POSTGRES_DB:-aether}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://aether:aether@db:5432/aether}
      - SECRET_KEY=${SECRET_KEY:-local-docker-secret-key-not-for-production}
      - ENV=${ENV:-development}
      - DEBUG=${DEBUG:-true}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - AUTO_INIT_DB=true
    restart: always
    ports:
      - "${API_PORT:-8002}:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      args:
        API_INTERNAL_URL: http://api:8000
        NEXT_PUBLIC_API_URL: /api
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - API_INTERNAL_URL=http://api:8000
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  aether_postgres_data:
