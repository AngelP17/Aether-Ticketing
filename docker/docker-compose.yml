version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ENV=production
    restart: always
    ports:
      - "8000:8000"

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - API_INTERNAL_URL=http://api:8000
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - api
